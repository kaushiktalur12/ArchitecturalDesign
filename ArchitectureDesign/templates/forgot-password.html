<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GenArch AI – Reset Password</title>
    <link
      rel="stylesheet"
      href="{{ url_for('static', filename='css/auth.css') }}"
    />
    <style>
      .error-msg {
        background: rgba(248, 113, 113, 0.15);
        border: 1px solid rgba(248, 113, 113, 0.4);
        color: #f87171;
        border-radius: 8px;
        padding: 10px 14px;
        font-size: 0.82rem;
        margin-bottom: 16px;
      }
      .success-msg {
        background: rgba(52, 211, 153, 0.15);
        border: 1px solid rgba(52, 211, 153, 0.4);
        color: #34d399;
        border-radius: 8px;
        padding: 10px 14px;
        font-size: 0.82rem;
        margin-bottom: 16px;
      }
      .hidden {
        display: none;
      }

      /* ── Strength bar ── */
      .strength-row {
        display: flex;
        gap: 6px;
        margin-top: 8px;
      }
      .sb {
        flex: 1;
        height: 4px;
        border-radius: 2px;
        background: rgba(255, 255, 255, 0.1);
        transition: background 0.3s;
      }
      .sb.weak {
        background: #f87171;
      }
      .sb.fair {
        background: #fbbf24;
      }
      .sb.good {
        background: #34d399;
      }
      .sb.strong {
        background: #22d3ee;
      }

      #reset-strength-label {
        font-size: 0.72rem;
        color: var(--muted);
        margin-top: 4px;
        min-height: 16px;
      }

      .match-msg {
        font-size: 0.75rem;
        margin-top: 5px;
      }
      .match-msg.ok {
        color: #34d399;
      }
      .match-msg.bad {
        color: #f87171;
      }

      /* ── Back link ── */
      .back-link {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        font-size: 0.82rem;
        color: var(--cyan);
        text-decoration: none;
        margin-bottom: 22px;
        cursor: pointer;
      }
      .back-link:hover {
        text-decoration: underline;
      }

      .page-title {
        font-size: 1.6rem;
        font-weight: 700;
        color: var(--text);
        margin-bottom: 4px;
      }
      .page-sub {
        font-size: 0.875rem;
        color: var(--muted);
        margin-bottom: 28px;
      }
    </style>
  </head>
  <body class="auth-body">
    <!-- Animated blobs -->
    <div class="bg-blob blob1"></div>
    <div class="bg-blob blob2"></div>
    <div class="bg-blob blob3"></div>
    <div class="grid-overlay"></div>

    <!-- ══════════════ RESET PASSWORD CARD ══════════════ -->
    <div class="auth-card">
      <!-- Logo -->
      <div class="auth-logo">
        <div class="logo-icon">
          <svg
            viewBox="0 0 40 40"
            fill="none"
            xmlns="http://www.w3.org/2000/svg"
          >
            <rect width="40" height="40" rx="10" fill="url(#lg1)" />
            <path
              d="M8 28 L20 12 L32 28 Z"
              stroke="white"
              stroke-width="2"
              fill="none"
            />
            <rect
              x="15"
              y="20"
              width="10"
              height="8"
              stroke="white"
              stroke-width="1.5"
              fill="none"
            />
            <defs>
              <linearGradient id="lg1" x1="0" y1="0" x2="40" y2="40">
                <stop offset="0%" stop-color="#7c3aed" />
                <stop offset="100%" stop-color="#06b6d4" />
              </linearGradient>
            </defs>
          </svg>
        </div>
        <span class="logo-text">GenArch AI</span>
      </div>

      <!-- Back to login -->
      <a class="back-link" href="/login">&#8592; Back to Login</a>

      <h2 class="page-title">Reset Password</h2>
      <p class="page-sub">Enter your email and choose a new password</p>

      <div id="error-msg" class="error-msg hidden"></div>
      <div id="success-msg" class="success-msg hidden"></div>

      <!-- Email -->
      <div class="form-group">
        <label>REGISTERED EMAIL</label>
        <input
          id="reset-email"
          type="email"
          placeholder="you@example.com"
          autocomplete="off"
        />
      </div>

      <!-- New Password + eye -->
      <div class="form-group">
        <label>NEW PASSWORD</label>
        <div class="pw-wrap">
          <input
            id="reset-password"
            type="password"
            placeholder="Min 8 chars, A–Z, 0–9, symbol"
            oninput="checkResetStrength(this.value)"
          />
          <button
            class="eye-btn"
            onclick="toggleEye('reset-password', 'eye2')"
            type="button"
          >
            <svg
              id="eye2"
              width="20"
              height="20"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
            >
              <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z" />
              <circle cx="12" cy="12" r="3" />
            </svg>
          </button>
        </div>
        <!-- Strength bars -->
        <div class="strength-row">
          <div class="sb" id="rsb1"></div>
          <div class="sb" id="rsb2"></div>
          <div class="sb" id="rsb3"></div>
          <div class="sb" id="rsb4"></div>
        </div>
        <div id="reset-strength-label"></div>
      </div>

      <!-- Confirm Password + eye -->
      <div class="form-group">
        <label>CONFIRM PASSWORD</label>
        <div class="pw-wrap">
          <input
            id="reset-confirm"
            type="password"
            placeholder="Re-enter new password"
            oninput="checkResetMatch()"
          />
          <button
            class="eye-btn"
            onclick="toggleEye('reset-confirm', 'eye3')"
            type="button"
          >
            <svg
              id="eye3"
              width="20"
              height="20"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
            >
              <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z" />
              <circle cx="12" cy="12" r="3" />
            </svg>
          </button>
        </div>
        <div id="reset-match-msg" class="match-msg"></div>
      </div>

      <button class="auth-btn" onclick="doResetPassword()">
        Reset Password →
      </button>
    </div>

    <script src="{{ url_for('static', filename='js/auth.js') }}"></script>
    <script>
      /* ── Strength ── */
      function checkResetStrength(pw) {
        const len = pw.length >= 8;
        const up = /[A-Z]/.test(pw);
        const num = /[0-9]/.test(pw);
        const sym = /[!@#$%^&*()_+\-=\[\]{};':"\\|,.<>\/?]/.test(pw);
        const score = [len, up, num, sym].filter(Boolean).length;
        const labels = ["", "Weak", "Fair", "Good", "Strong"];
        const classes = ["", "weak", "fair", "good", "strong"];
        ["rsb1", "rsb2", "rsb3", "rsb4"].forEach((id, i) => {
          document.getElementById(id).className =
            "sb " + (i < score ? classes[score] : "");
        });
        document.getElementById("reset-strength-label").textContent =
          score > 0 ? labels[score] : "";
        checkResetMatch();
      }

      /* ── Match ── */
      function checkResetMatch() {
        const pw = document.getElementById("reset-password").value;
        const cf = document.getElementById("reset-confirm").value;
        const msg = document.getElementById("reset-match-msg");
        if (!cf) {
          msg.textContent = "";
          return;
        }
        if (pw === cf) {
          msg.textContent = "✓ Passwords match";
          msg.className = "match-msg ok";
        } else {
          msg.textContent = "✗ Passwords do not match";
          msg.className = "match-msg bad";
        }
      }

      /* ── Reset API call ── */
      async function doResetPassword() {
        const email = document.getElementById("reset-email").value.trim();
        const password = document.getElementById("reset-password").value;
        const confirm = document.getElementById("reset-confirm").value;

        const showErr = (msg) => {
          const el = document.getElementById("error-msg");
          el.textContent = msg;
          el.classList.remove("hidden");
          setTimeout(() => el.classList.add("hidden"), 4000);
        };
        const showOk = (msg) => {
          const el = document.getElementById("success-msg");
          el.textContent = msg;
          el.classList.remove("hidden");
        };

        if (!email || !password || !confirm) {
          showErr("Please fill in all fields");
          return;
        }
        if (password.length < 8) {
          showErr("Password must be at least 8 characters");
          return;
        }
        if (!/[A-Z]/.test(password)) {
          showErr("Password must contain an uppercase letter");
          return;
        }
        if (!/[0-9]/.test(password)) {
          showErr("Password must contain a number");
          return;
        }
        if (!/[!@#$%^&*()_+\-=\[\]{};':"\\|,.<>\/?]/.test(password)) {
          showErr("Password must contain a special character");
          return;
        }
        if (password !== confirm) {
          showErr("Passwords do not match");
          return;
        }

        try {
          const res = await fetch("/reset-password", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ email, password }),
          });
          const data = await res.json();
          if (data.ok) {
            showOk("Password reset! Redirecting to login...");
            setTimeout(() => (window.location.href = "/login"), 2200);
          } else {
            showErr(data.msg || "Reset failed. Check your email.");
          }
        } catch {
          showErr("Network error. Please try again.");
        }
      }

      /* ── Enter key ── */
      document.addEventListener("keydown", (e) => {
        if (e.key === "Enter") doResetPassword();
      });
    </script>
  </body>
</html>
